<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuỗi Luyện Phát Âm Caddie</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        button { padding: 15px 30px; font-size: 18px; background: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; }
        #question { font-size: 24px; font-weight: bold; margin: 20px 0; color: #333; }
        #status { font-size: 16px; color: #666; }
    </style>
</head>
<body>
    <h1>Luyện tập Chào hỏi</h1>
    <p>Hãy đọc câu sau:</p>
    <div id="question"></div>
    <button onclick="startListening()">Bấm để nói</button>
    <p id="status">Sẵn sàng...</p>
    <p id="progress"></p>

    <script>
        const sentences = [
            "good morning sir",
            "good afternoon madam",
            "my name is caddie",
            "i will be your caddie today",
            "it is a pleasure to serve you"
        ];
        let currentIndex = 0;

        function showQuestion() {
            if (currentIndex < sentences.length) {
                document.getElementById('question').innerText = sentences[currentIndex];
                document.getElementById('progress').innerText = "Câu " + (currentIndex + 1) + "/" + sentences.length;
            } else {
                document.getElementById('question').innerText = "Chúc mừng! Bạn đã hoàn thành bài tập.";
                document.querySelector('button').style.display = 'none';
            }
        }

        function startListening() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'en-US';
            recognition.start();
            document.getElementById('status').innerText = "Đang lắng nghe...";

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript.toLowerCase();
                if (transcript.includes(sentences[currentIndex])) {
                    document.getElementById('status').innerText = "✅ Chính xác! Chuyển câu tiếp...";
                    currentIndex++;
                    setTimeout(showQuestion, 1500);
                } else {
                    document.getElementById('status').innerText = "❌ Chưa khớp: " + transcript + ". Thử lại nhé!";
                }
            };
        }
        showQuestion();
    </script>
</body>
</html>
