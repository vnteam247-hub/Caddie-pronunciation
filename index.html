<script>
    function startListening() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            document.getElementById('status').innerText = "Trình duyệt của bạn không hỗ trợ nhận diện giọng nói. Hãy thử dùng Chrome!";
            return;
        }

        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.start();
        
        document.getElementById('status').innerText = "Đang lắng nghe...";

        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript.toLowerCase();
            document.getElementById('status').innerText = "Bạn đã nói: " + transcript;
            
            if (transcript.includes("good morning")) {
                document.getElementById('result').innerText = "✅ Chính xác!";
                document.getElementById('result').style.color = "green";
            } else {
                document.getElementById('result').innerText = "❌ Chưa khớp. Hãy thử lại!";
                document.getElementById('result').style.color = "red";
            }
        };

        recognition.onerror = function(event) {
            document.getElementById('status').innerText = "Lỗi: " + event.error;
        };
    }
</script>
